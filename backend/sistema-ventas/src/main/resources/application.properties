# Nombre del proyecto
spring.application.name=sistema-ventas

# Configuración de la conexión a la Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_ventas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=h100704sc

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto del servidor (por defecto es 8080)
server.port=8080